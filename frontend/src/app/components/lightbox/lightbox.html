<div
  class="lightbox-backdrop fixed inset-0 z-[9999] bg-black/95 flex items-center justify-center animate-[fadeIn_0.2s_ease]"
  (click)="onBackdropClick($event)"
>
  <!-- Close button -->
  <button
    class="absolute top-4 right-4 w-10 h-10 rounded-full bg-white/10 text-white flex items-center justify-center cursor-pointer hover:bg-white/20 transition-colors text-xl z-10"
    (click)="close.emit()"
  >&#10005;</button>

  <!-- Counter -->
  <span class="absolute top-5 left-5 text-white/60 text-sm">
    {{ current() + 1 }} / {{ total() }}
  </span>

  <!-- Image -->
  <img
    [src]="images()[current()]"
    class="max-h-[90vh] max-w-[90vw] object-contain rounded-lg select-none"
    [alt]="'Image ' + (current() + 1)"
  />

  <!-- Navigation -->
  @if (total() > 1) {
    <button
      class="absolute left-4 top-1/2 -translate-y-1/2 w-12 h-12 rounded-full bg-white/10 text-white flex items-center justify-center cursor-pointer hover:bg-white/20 transition-colors text-lg"
      (click)="prev()"
    >&#10094;</button>
    <button
      class="absolute right-4 top-1/2 -translate-y-1/2 w-12 h-12 rounded-full bg-white/10 text-white flex items-center justify-center cursor-pointer hover:bg-white/20 transition-colors text-lg"
      (click)="next()"
    >&#10095;</button>
  }
</div>
