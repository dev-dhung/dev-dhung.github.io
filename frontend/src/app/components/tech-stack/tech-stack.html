<section class="py-24 md:py-28" [class]="sectionBg()" id="tech">
  <div class="max-w-[1100px] mx-auto px-6">
    <h2 appScrollAnimate class="font-heading text-4xl font-semibold mb-2" [class]="titleColor()">
      {{ 'tech.title' | translate }}
    </h2>
    <p appScrollAnimate [delay]="100" class="text-base mb-12" [class]="mutedColor()">
      {{ 'tech.subtitle' | translate }}
    </p>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      @for (category of categories; track category.labelKey; let i = $index) {
        <div
          appScrollAnimate [delay]="i * 100"
          class="rounded-2xl border p-7 transition-colors duration-200"
          [class]="cardStyle()"
        >
          <h3 class="text-sm font-semibold uppercase tracking-wider text-accent mb-4">
            {{ category.labelKey | translate }}
          </h3>
          <div class="flex flex-wrap gap-2.5">
            @for (item of category.items; track item) {
              <span class="px-4 py-2 rounded-lg text-sm font-medium border transition-all duration-200" [class]="itemStyle()">
                {{ item }}
              </span>
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>
