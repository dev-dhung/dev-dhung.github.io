<section class="py-24 md:py-28" id="contact">
  <div class="max-w-[1100px] mx-auto px-6">
    <h2 appScrollAnimate class="font-heading text-4xl font-semibold mb-2" [class]="titleColor()">
      {{ 'contact.title' | translate }}
    </h2>
    <p appScrollAnimate [delay]="100" class="text-base mb-12" [class]="mutedColor()">
      {{ 'contact.subtitle' | translate }}
    </p>

    <form
      appScrollAnimate [delay]="200"
      class="max-w-xl space-y-5"
      [formGroup]="contactForm"
      (ngSubmit)="onSubmit()"
    >
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wider mb-2" [class]="labelColor()">
          {{ 'contact.name' | translate }}
        </label>
        <input
          type="text"
          formControlName="name"
          [placeholder]="'contact.name.placeholder' | translate"
          class="w-full px-4 py-3.5 rounded-lg border outline-none transition-colors duration-200 text-sm"
          [class]="inputStyle()"
        />
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase tracking-wider mb-2" [class]="labelColor()">
          {{ 'contact.email' | translate }}
        </label>
        <input
          type="email"
          formControlName="email"
          [placeholder]="'contact.email.placeholder' | translate"
          class="w-full px-4 py-3.5 rounded-lg border outline-none transition-colors duration-200 text-sm"
          [class]="inputStyle()"
        />
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase tracking-wider mb-2" [class]="labelColor()">
          {{ 'contact.message' | translate }}
        </label>
        <textarea
          formControlName="message"
          [placeholder]="'contact.message.placeholder' | translate"
          rows="5"
          class="w-full px-4 py-3.5 rounded-lg border outline-none transition-colors duration-200 text-sm resize-y min-h-[120px]"
          [class]="inputStyle()"
        ></textarea>
      </div>

      <button
        type="submit"
        [disabled]="sending() || contactForm.invalid"
        class="px-9 py-3.5 rounded-lg text-sm font-semibold transition-all duration-200 hover:-translate-y-0.5 hover:shadow-lg disabled:opacity-60 disabled:cursor-not-allowed cursor-pointer"
        [class]="btnStyle()"
      >
        {{ (sending() ? 'contact.sending' : 'contact.send') | translate }}
      </button>

      @if (status() === 'success') {
        <p class="text-sm font-medium text-green-500 mt-4">{{ 'contact.success' | translate }}</p>
      }
      @if (status() === 'error') {
        <p class="text-sm font-medium text-red-500 mt-4">{{ 'contact.error' | translate }}</p>
      }
    </form>
  </div>
</section>
